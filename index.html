<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPPY BIRTHDAY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="disque.png">
</head>

<body>
    
    <div id="up">
        <h1> ALYBABA'S SONGS AND COVERS FOR KYKY THE BEST BOY </h1>
    </div>

    <div class="btn">
        <img src="images/arrow.png" class="icone">
    </div>


    <div class="song_container_beige">
        <div class="text_zone">
            <p>"LOREM IPSUM"</p>
            <p class="author">BY ALYBABA</p>
        </div>
        <div class="album_zone">
            <img src="images/LIAlbum.png" alt="Album cover"/>
            <audio controls><source src="songs/lorem Ipsum.mp3" type="audio/mpeg"></audio>
        </div>
        <div class="image_zone">
            <img src="images/canard.png" alt="Dessin canard"/>
        </div>
    </div>


    <div class="song_container_black">
        <div class="text_zone">
            <p>"ODE À CHOUPETTE"</p>
            <p class="author">BY ALYBABA AND LEGUMAN</p>
        </div>
        <div class="album_zone">
            <img src="images/catAlbum.png" alt="Album cover"/>
            <audio controls><source src="songs/Ode à choupette.MP3" type="audio/mpeg"></audio>
        </div>
        <div class="image_zone">
            <img src="images/cat.png" alt="Dessin chat"/>
        </div>
    </div>


    <div class="song_container_beige">
        <div class="text_zone">
            <p>"TAKE ON ME"</p>
            <p class="author"> BY A HA </br> THE LAST OF US VERSION</p>
        </div>
        <div class="album_zone">
            <img src="images/TOMAlbum.png" alt="Album cover"/>
            <audio controls><source src="songs/Take on me.MP3" type="audio/mpeg"></audio>
        </div>
        <div class="image_zone">
            <img src="images/dogo.png" alt="Dessin chien"/>
        </div>
    </div>


    <div class="song_container_black">
        <div class="text_zone">
            <p>"ISABELLA'S LULLABY"</p>
            <p class="author">BY TAKAHIRO OBATA </p>
        </div>
        <div class="album_zone">
            <img src="images/IsabellaAlbum.png" alt="Album cover"/>
            <audio controls><source src="songs/Isabella.MP3" type="audio/mpeg"></audio>
        </div>
        <div class="image_zone">
            <img src="images/renard.png" alt="Dessin renard"/>
        </div>
    </div>


    <div class="song_container_beige">
        <div class="text_zone">
            <p> "TRAVELERS" </br> FROM OUTER WILDS </p>
            <p class="author"> BY ANDREW PRAHLOW </p>
        </div>
        <div class="album_zone">
            <img src="images/OWAlbum.png" alt="Album cover"/>
            <audio controls><source src="songs/OuterWilds.MP3" type="audio/mpeg"></audio>
        </div>
        <div class="image_zone">
            <img src="images/tiger.png" alt="Dessin tigre"/>
        </div>
    </div>

    <div class="song_container_black">
        <div class="text_zone">
            <p>COMING SOON</p>
            <p class="author"> </p>
        </div>
        <div class="album_zone">
            <img src="images/CS2Album.png" alt="Album cover"/>
            <audio controls><source src="" type="audio/mpeg"></audio>
        </div>
        <div class="image_zone">
            <img src="images/pandar.png" alt="Dessin panda roux"/>
        </div>
    </div>

<script src="script.js"></script>
</body>

</html>
